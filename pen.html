<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Paper.js 精确圆角</title>
    <!-- 引入 Paper.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .toolbar { padding: 15px; background: #fff; display: flex; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        canvas { flex-grow: 1; background: #fafafa; cursor: crosshair; width: 100%; height: 100%; }
        input[type="range"] { width: 200px; }
    </style>
</head>
<body>

<div class="toolbar">
    <div>
        圆角大小: <input type="range" id="radius" min="0" max="100" value="20">
        <span id="radiusVal">20px</span>
    </div>
    <button onclick="downloadSVG()">导出为SVG (矢量精确)</button>
</div>

<!-- Paper.js 画布 -->
<canvas id="myCanvas" resize></canvas>

<script type="text/javascript">
    // 初始化 Paper.js
    paper.setup(document.getElementById('myCanvas'));
    
    let path;
    const radiusInput = document.getElementById('radius');
    const radiusVal = document.getElementById('radiusVal');

    radiusInput.oninput = () => radiusVal.textContent = radiusInput.value + 'px';

    // 使用 Paper.js 的 Tool 对象处理交互
    const tool = new paper.Tool();
    let startPoint;

    tool.onMouseDown = function(event) {
        startPoint = event.point;
        // 创建一个矩形路径
        path = new paper.Path.Rectangle({
            point: startPoint,
            size: [1, 1],
            strokeColor: '#2563eb',
            fillColor: new paper.Color(37, 99, 235, 0.1),
            strokeWidth: 2,
            // 初始圆角
            radius: parseInt(radiusInput.value)
        });
    }

    tool.onMouseDrag = function(event) {
        // 实时更新矩形
        const rect = new paper.Rectangle(startPoint, event.point);
        
        // 重新生成路径以更新形状和圆角
        path.remove(); // 移除旧路径
        
        // 这里的圆角计算是 Paper.js 内部数学引擎处理的，极其精确
        const currentRadius = Math.min(
            parseInt(radiusInput.value), 
            Math.abs(rect.width / 2), 
            Math.abs(rect.height / 2)
        );

        path = new paper.Path.Rectangle(rect, currentRadius);
        path.fillColor = new paper.Color(37, 99, 235, 0.2);
        path.strokeColor = '#2563eb';
        path.strokeWidth = 2;
    }

    tool.onMouseUp = function(event) {
        // 绘制完成，将预览色改为实色
        path.fillColor = '#2563eb';
    }

    function downloadSVG() {
        const svg = paper.project.exportSVG({asString: true});
        const blob = new Blob([svg], {type: "image/svg+xml"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "drawing.svg";
        link.click();
    }
</script>
</body>
</html>
